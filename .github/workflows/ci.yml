name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff
        run: ruff check .

      - name: Pytest
        env:
          SITE_COPILOT_USE_MOCK_LLM: "1"
        run: pytest -q

      - name: Eval (mock LLM)
        env:
          SITE_COPILOT_USE_MOCK_LLM: "1"
        run: python -m evals.run_evals
